<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Gráficos</title>
</head>
<body>
    <header>
        <h1>Gerador de Gráficos</h1>
    </header>
    <main>
        <section class="secao-gerador">
            <h2>Gerar Novo Gráfico</h2>
            <div class="grupo-formulario">
                <label for="quantidade-itens">Quantidade de Itens:</label>
                <input type="number" id="quantidade-itens" placeholder="Ex: 5">

                <label>Grupos (categorias):</label>
                <div class="grupo-checkboxes">
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-primos" value="primos">
                        <span>Números Primos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-pares" value="pares">
                        <span>Pares</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-impares" value="impares">
                        <span>Ímpares</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-negativos" value="negativos">
                        <span>Negativos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-positivos" value="positivos">
                        <span>Positivos</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="grupo-outros" value="outros">
                        <span>Outros</span>
                    </label>
                </div>
                
                <label for="tipo-grafico">Tipo de Gráfico:</label>
                <select id="tipo-grafico">
                    <option value="bar">Barras</option>
                    <option value="line">Linha</option>
                    <option value="doughnut">Pizza</option>
                    <option value="polarArea">Polar</option>
                    <option value="radar">Radar</option>
                </select>
            </div>

            <button id="botao-gerar">Gerar Gráfico</button>
        </section>

        <section class="exibicao-grafico">
            <h2>Gráfico Gerado</h2>
            <div id="area-grafico">
                <p>Seu gráfico aparecerá aqui após ser criado.</p>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
